<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B3E6B">
  <title>Conectores — SE JAGUARA 345 kV · REMO ENGENHARIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Banco de dados externo — todos os catálogos MAXXWELD -->
  <script src="dados.js"></script>
  <style>
    :root {
      --azul:     #1B3E6B;
      --azul-m:   #2A5FA8;
      --verde:    #00A651;
      --amarelo:  #F5C400;
      --cinza-bg: #f4f6f9;
      --cinza-bd: #dde3ec;
      --texto:    #1a1a2e;
      --texto-l:  #6b7a99;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--cinza-bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────────────────────────────── */
    header {
      background: linear-gradient(90deg, var(--azul) 0%, var(--azul-m) 60%, var(--verde) 100%);
      color: white;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
    }

    .logo-box {
      background: white;
      border-radius: 8px;
      padding: 6px 13px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--azul);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .header-texts h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.4px;
      line-height: 1.1;
    }

    .header-texts p {
      font-size: 12px;
      opacity: 0.82;
      margin-top: 3px;
    }

    .header-badge {
      margin-left: auto;
      text-align: center;
      flex-shrink: 0;
    }

    .header-badge .num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      display: block;
    }

    .header-badge .lbl {
      font-size: 11px;
      opacity: 0.8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── BARRA DE FILTROS ────────────────────────────────────────────── */
    .filter-bar {
      background: white;
      border-bottom: 1px solid var(--cinza-bd);
      padding: 10px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--texto-l);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 34px;
      border: 1.5px solid var(--cinza-bd);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus { border-color: var(--azul); }

    select {
      padding: 8px 10px;
      border: 1.5px solid var(--cinza-bd);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      background: white;
      cursor: pointer;
      outline: none;
      color: var(--texto);
    }

    select:focus { border-color: var(--azul); }

    .btn-limpar {
      padding: 8px 14px;
      background: var(--cinza-bg);
      border: 1.5px solid var(--cinza-bd);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      color: var(--texto-l);
      transition: background .15s;
    }

    .btn-limpar:hover { background: #e4eaf5; }

    /* ── INFO RESULTADOS ─────────────────────────────────────────────── */
    .results-info {
      padding: 8px 24px;
      font-size: 12.5px;
      color: var(--texto-l);
    }

    /* ── GRID ────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 14px;
      padding: 0 24px 36px;
    }

    /* ── CARD ────────────────────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--cinza-bd);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(27,62,107,.13);
      transform: translateY(-2px);
    }

    .card-img {
      height: 138px;
      background: linear-gradient(135deg, #edf0f7, #dde3ec);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .card-img img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .card-img .placeholder {
      font-size: 50px;
      opacity: .22;
      user-select: none;
    }

    .badge-tipo {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--azul);
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: .5px;
      text-transform: uppercase;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-tensao {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--amarelo);
      color: var(--azul);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .card-body {
      padding: 13px 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15.5px;
      font-weight: 700;
      color: var(--azul);
      line-height: 1.2;
    }

    .card-ref {
      font-size: 11.5px;
      color: var(--texto-l);
      font-family: 'Barlow Condensed', sans-serif;
    }

    .codes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
    }

    .code-item .clbl {
      font-size: 10px;
      color: var(--texto-l);
      text-transform: uppercase;
      letter-spacing: .4px;
      display: block;
    }

    .code-item .cval {
      font-size: 13px;
      font-weight: 600;
      color: var(--texto);
    }

    .oc-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .oc-chip {
      background: #eef2f9;
      color: var(--azul);
      border: 1px solid #c5d0e8;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .oc-chip:hover { background: var(--azul); color: white; }

    .card-btns {
      display: flex;
      gap: 7px;
      margin-top: auto;
    }

    .btn-det, .btn-des {
      flex: 1;
      padding: 7px 6px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .btn-det { background: var(--azul); color: white; }
    .btn-det:hover { background: var(--azul-m); }

    .btn-des { background: white; color: var(--azul); border: 1.5px solid var(--azul); }
    .btn-des:hover { background: #eef2f9; }

    /* ── SEM RESULTADOS ──────────────────────────────────────────────── */
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 20px;
      color: var(--texto-l);
    }

    .no-results .ico { font-size: 52px; display: block; margin-bottom: 14px; }

    /* ── MODAL ───────────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.on { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      max-width: 720px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.32);
      position: relative;
    }

    .modal-head {
      background: linear-gradient(90deg, var(--azul), var(--azul-m));
      color: white;
      padding: 20px 24px 18px;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .modal-head h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      padding-right: 36px;
    }

    .modal-head p {
      font-size: 12px;
      opacity: .78;
      margin-top: 4px;
    }

    .btn-fechar {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,.18);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-fechar:hover { background: rgba(255,255,255,.3); }

    .modal-body {
      padding: 22px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .m-sec h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--texto-l);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--cinza-bd);
      margin-bottom: 12px;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .spec-box {
      background: var(--cinza-bg);
      border-radius: 8px;
      padding: 9px 12px;
    }

    .spec-box .slbl {
      font-size: 10.5px;
      color: var(--texto-l);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .spec-box .sval {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--texto);
      margin-top: 2px;
    }

    .desc-box {
      background: var(--cinza-bg);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #3a3f5a;
    }

    .normas-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .norma-chip {
      background: #fff8dc;
      color: #7a5800;
      border: 1px solid #e8cc50;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .apar-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .apar-table th {
      background: #eef2f9;
      padding: 8px 11px;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--azul);
    }

    .apar-table td {
      padding: 8px 11px;
      border-top: 1px solid var(--cinza-bd);
      vertical-align: middle;
    }

    .apar-table tr:hover td { background: #f7faff; }

    .btn-pdf {
      padding: 5px 12px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-pdf:hover { background: #008c44; }

    .pdf-aviso {
      font-size: 12px;
      color: #7a5800;
      background: #fffbea;
      border: 1px solid #e8d050;
      border-radius: 8px;
      padding: 9px 14px;
      margin-top: 10px;
    }

    /* ── RESPONSIVO ──────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; padding: 0 12px 28px; }
      .filter-bar { padding: 9px 12px; }
      .results-info { padding: 7px 12px; }
      .header-badge { display: none; }
      .specs-grid, .codes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
<header>
  <div class="header-inner">
    <div class="logo-box">REMO</div>
    <div class="header-texts">
      <h1>Catálogo de Conectores</h1>
      <p>SE JAGUARA 345 kV &middot; CEMIG GERAÇÃO E TRANSMISSÃO &middot; TK 20405 Lote 01 &middot; MAXXWELD</p>
    </div>
    <div class="header-badge">
      <span class="num" id="stat-total">—</span>
      <span class="lbl">Conectores</span>
    </div>
  </div>
</header>

<!-- ══ FILTROS ══════════════════════════════════════════════════════════ -->
<div class="filter-bar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="busca"
           placeholder="Buscar por nome, cód. CEMIG, referência MAXXWELD, SAP…"
           oninput="filtrar()">
  </div>
  <select id="filtro-oc" onchange="filtrar()">
    <option value="">Todos os catálogos</option>
  </select>
  <select id="filtro-tipo" onchange="filtrar()">
    <option value="">Todos os tipos</option>
  </select>
  <select id="filtro-tensao" onchange="filtrar()">
    <option value="">Todas as tensões</option>
    <option value="13.8">13,8 kV</option>
    <option value="138">138 kV</option>
    <option value="230">230 kV</option>
    <option value="345">345 kV</option>
    <option value="362">362 kV</option>
    <option value="550">550 kV</option>
  </select>
  <button class="btn-limpar" onclick="limpar()">✕ Limpar</button>
</div>

<div class="results-info" id="results-info"></div>

<!-- ══ GRID ════════════════════════════════════════════════════════════ -->
<div class="grid" id="grid"></div>

<!-- ══ MODAL ═══════════════════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="fecharSe(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-nome">—</h2>
      <p  id="m-sub">—</p>
      <button class="btn-fechar" onclick="fechar()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<!-- ══ SCRIPT ══════════════════════════════════════════════════════════ -->
<script>
// ── Inicialização ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('stat-total').textContent = CONECTORES.length;
  popularSelects();
  filtrar();
});

function popularSelects() {
  // OCs ordenados
  var selOC = document.getElementById('filtro-oc');
  Object.keys(CATALOGOS).sort().forEach(function (oc) {
    var c   = CATALOGOS[oc];
    var opt = document.createElement('option');
    opt.value       = oc;
    opt.textContent = 'OC ' + oc + ' — Escopo ' + c.escopo + ' Rev.' + c.rev;
    selOC.appendChild(opt);
  });
  // Tipos únicos
  var tipos = [];
  CONECTORES.forEach(function (c) {
    if (tipos.indexOf(c.tipo) < 0) tipos.push(c.tipo);
  });
  tipos.sort();
  var selTipo = document.getElementById('filtro-tipo');
  tipos.forEach(function (t) {
    var opt = document.createElement('option');
    opt.value = opt.textContent = t;
    selTipo.appendChild(opt);
  });
}

// ── Filtrar ───────────────────────────────────────────────────────────
function filtrar() {
  var busca   = (document.getElementById('busca').value   || '').toLowerCase().trim();
  var ocF     =  document.getElementById('filtro-oc').value;
  var tipoF   =  document.getElementById('filtro-tipo').value;
  var tensaoF =  document.getElementById('filtro-tensao').value;

  var res = CONECTORES.filter(function (c) {
    if (ocF     && !c.aparicoes.some(function (a) { return a.oc === ocF; })) return false;
    if (tipoF   && c.tipo !== tipoF)                                          return false;
    if (tensaoF && c.tensao_kv !== parseFloat(tensaoF))                       return false;
    if (busca) {
      var txt = [c.codigo_cemig, c.ref_maxxweld, c.codigo_sap, c.codigo_remo,
                 c.nome, c.tipo, c.descricao].join(' ').toLowerCase();
      if (txt.indexOf(busca) < 0) return false;
    }
    return true;
  });

  renderGrid(res);

  var info = document.getElementById('results-info');
  info.textContent = (res.length === CONECTORES.length)
    ? CONECTORES.length + ' conectores · ' + Object.keys(CATALOGOS).length + ' catálogos MAXXWELD'
    : res.length + ' de ' + CONECTORES.length + ' conectores encontrados';
}

function limpar() {
  document.getElementById('busca').value         = '';
  document.getElementById('filtro-oc').value     = '';
  document.getElementById('filtro-tipo').value   = '';
  document.getElementById('filtro-tensao').value = '';
  filtrar();
}

function filtrarOC(oc) {
  document.getElementById('filtro-oc').value = oc;
  filtrar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Render grid ───────────────────────────────────────────────────────
function renderGrid(lista) {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!lista.length) {
    grid.innerHTML =
      '<div class="no-results">' +
        '<span class="ico">🔍</span>' +
        '<strong>Nenhum conector encontrado.</strong><br>' +
        'Tente outros termos ou remova os filtros.' +
      '</div>';
    return;
  }
  lista.forEach(function (c) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = buildCard(c, CONECTORES.indexOf(c));
    grid.appendChild(div);
  });
}

function buildCard(c, idx) {
  var imgArea = c.foto
    ? '<img src="' + c.foto + '" alt="' + c.nome + '">'
    : '<span class="placeholder">🔩</span>';

  var chips = c.aparicoes.map(function (a) {
    return '<span class="oc-chip" onclick="event.stopPropagation();filtrarOC(\'' +
           a.oc + '\')">OC ' + a.oc + '</span>';
  }).join('');

  var peso = (c.peso_kg && c.peso_kg !== 'N/I') ? c.peso_kg + ' kg' : 'N/I';
  var cds = [
    { l: 'CEMIG',    v: c.codigo_cemig },
    { l: 'SAP',      v: c.codigo_sap   },
    { l: 'MAXXWELD', v: c.ref_maxxweld },
    { l: 'Peso',     v: peso           },
  ].map(function (x) {
    return '<div class="code-item"><span class="clbl">' + x.l +
           '</span><span class="cval">' + x.v + '</span></div>';
  }).join('');

  return (
    '<div class="card-img" onclick="abrirModal(' + idx + ')">' +
      imgArea +
      '<span class="badge-tipo">' + c.tipo + '</span>' +
      '<span class="badge-tensao">' + c.tensao + '</span>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-nome">' + c.nome + '</div>' +
      '<div class="card-ref">' + c.ref_maxxweld + '</div>' +
      '<div class="codes-grid">' + cds + '</div>' +
      '<div class="oc-chips">' + chips + '</div>' +
      '<div class="card-btns">' +
        '<button class="btn-det" onclick="abrirModal(' + idx + ')">📋 Detalhes</button>' +
        '<button class="btn-des" onclick="abrirDesenho(' + idx + ')">📐 Desenho</button>' +
      '</div>' +
    '</div>'
  );
}

// ── Modal Detalhes ────────────────────────────────────────────────────
function abrirModal(idx) {
  var c = CONECTORES[idx];

  document.getElementById('m-nome').textContent = c.nome;
  document.getElementById('m-sub').textContent  =
    'MAXXWELD · ' + c.ref_maxxweld + ' · Código CEMIG ' + c.codigo_cemig;

  var peso = (c.peso_kg && c.peso_kg !== 'N/I') ? c.peso_kg + ' kg' : 'N/I';

  var specs = [
    { l: 'Código CEMIG',   v: c.codigo_cemig },
    { l: 'Ref. MAXXWELD',  v: c.ref_maxxweld },
    { l: 'Código SAP',     v: c.codigo_sap   },
    { l: 'Código REMO',    v: c.codigo_remo  },
    { l: 'Tensão',         v: c.tensao       },
    { l: 'Peso',           v: peso           },
    { l: 'Material',       v: c.material     },
    { l: 'Unidade',        v: c.unidade      },
  ].map(function (s) {
    return '<div class="spec-box"><div class="slbl">' + s.l +
           '</div><div class="sval">' + s.v + '</div></div>';
  }).join('');

  var normas = c.normas.map(function (n) {
    return '<span class="norma-chip">' + n + '</span>';
  }).join('');

  var linhas = c.aparicoes.map(function (a) {
    var cat = CATALOGOS[a.oc] || {};
    return '<tr>' +
      '<td><strong>OC ' + a.oc + '</strong></td>' +
      '<td>Escopo ' + (cat.escopo || '—') + ' Rev.' + (cat.rev || '—') + '</td>' +
      '<td>' + a.pagina + '</td>' +
      '<td>' + a.qtd + ' pç</td>' +
      '<td>' + a.aplicacao + '</td>' +
      '<td><button class="btn-pdf" onclick="abrirPDF(\'' +
        a.oc + '\',' + a.pagina + ')">📄 Abrir PDF</button></td>' +
      '</tr>';
  }).join('');

  var tabela =
    '<table class="apar-table">' +
      '<thead><tr>' +
        '<th>Catálogo OC</th><th>Escopo / Rev.</th><th>Pág.</th>' +
        '<th>Qtd.</th><th>Aplicação</th><th></th>' +
      '</tr></thead>' +
      '<tbody>' + linhas + '</tbody>' +
    '</table>' +
    '<div class="pdf-aviso">' +
      '📄 Os desenhos técnicos abrem em nova aba diretamente no navegador.' +
    '</div>';

  document.getElementById('m-body').innerHTML =
    sec('Especificações Técnicas',
        '<div class="specs-grid">' + specs + '</div>') +
    sec('Descrição Completa',
        '<div class="desc-box">' + c.descricao + '</div>') +
    sec('Normas de Referência',
        '<div class="normas-wrap">' + normas + '</div>') +
    sec('Aparece nos Catálogos (' + c.aparicoes.length + ')', tabela);

  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function sec(titulo, html) {
  return '<div class="m-sec"><h3>' + titulo + '</h3>' + html + '</div>';
}

function fechar() {
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow = '';
}

function fecharSe(e) {
  if (e.target === document.getElementById('overlay')) fechar();
}

document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') fechar();
});

// ── Abertura de PDF via Dropbox local ────────────────────────────────
function abrirDesenho(idx) {
  var c = CONECTORES[idx];
  if (c.aparicoes.length === 1) {
    abrirPDF(c.aparicoes[0].oc, c.aparicoes[0].pagina);
  } else {
    // Abre modal e rola até tabela de catálogos
    abrirModal(idx);
    setTimeout(function () {
      var t = document.querySelector('.apar-table');
      if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
  }
}

function abrirPDF(oc, pagina) {
  var cat = CATALOGOS[oc];
  if (!cat) return;
  // Caminho relativo ao catalogo.html → funciona local e no GitHub Pages
  var url = PDF_BASE + cat.arquivo + '#page=' + (pagina + 1);
  window.open(url, '_blank');
}
</script>
